id: process-lowercase-name
language: nextflow
message: Process names should use UPPERCASE (e.g., FASTQC, ALIGN_READS)
severity: warning
note: |
  nf-core convention is UPPERCASE with underscores (e.g., FASTQC, ALIGN_READS, QUANTIFY_EXPRESSION)
rule:
  pattern: process $NAME { $$$ }
constraints:
  NAME:
    regex: '^[a-z]'
