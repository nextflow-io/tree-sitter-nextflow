# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
        args: [--allow-multiple-documents]  # ast-grep outline rules are multi-doc YAML
    -   id: check-added-large-files

# Tree-sitter specific hooks
-   repo: local
    hooks:
    -   id: tree-sitter-generate
        name: Generate tree-sitter grammar
        entry: tree-sitter generate
        language: system
        files: ^grammar\.js$
        pass_filenames: false
        always_run: false
    -   id: tree-sitter-build
        name: Build tree-sitter grammar
        entry: tree-sitter build
        language: system
        files: ^(grammar\.js|src/grammar\.json|src/parser\.c)$
        pass_filenames: false
        always_run: false
    -   id: tree-sitter-test
        name: Run tree-sitter tests (allows skipped/failing)
        entry: bash -c 'tree-sitter test || true'
        language: system
        files: ^(grammar\.js|test/corpus/.*)$
        pass_filenames: false
        always_run: false
